spring:
  application:
    name: axin-agent
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-06700e91df384f1f8a5eb8f708a8183d}
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json

server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.axin.axinagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

search-api:
  api-key: ${SEARCH_API_KEY:zsmSBAyoiNHWVWGwUpT8LNNV}

axin:
  model:
    primary:
      model-name: qwen-max
      temperature: 0.7
      max-tokens: 4096
    light:
      model-name: qwen-turbo
      temperature: 0.3
      max-tokens: 2048
